<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri-Forest Fire Risk Analysis</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; padding: 20px; }
        .container { max-width: 1250px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; }
        h1 { color: #38bdf8; border-bottom: 2px solid #0284c7; padding-bottom: 10px; }
        h2 { color: #f8fafc; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        .dashboard-layout { display: grid; grid-template-columns: 450px 1fr; gap: 25px; margin-top: 25px; }
        .control-panel { background: #0f172a; padding: 20px; border-radius: 10px; border: 1px solid #334155; }
        .main-display { display: flex; flex-direction: column; gap: 25px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        .form-group label { font-weight: 600; margin-bottom: 8px; color: #94a3b8; display: flex; justify-content: space-between; }
        .form-group label span { color: #38bdf8; font-family: monospace; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 8px; background: #334155; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: #38bdf8; border-radius: 50%; cursor: pointer; }
        .submit-btn { width: 100%; background-color: #0284c7; color: white; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; text-transform: uppercase; }
        .submit-btn:hover { background-color: #0369a1; }
        .output-panel { background: #0f172a; padding: 20px; border-radius: 10px; border: 1px solid #334155; text-align: center; }
        .prediction-text { font-size: 28px; font-weight: 800; margin-top: 10px; }
        .risk-Low { color: #4ade80; }
        .risk-Medium { color: #fbbf24; }
        .risk-High { color: #f87171; }
        pre { background: #0f172a; color: #94a3b8; padding: 15px; border-radius: 6px; overflow-x: auto; border: 1px solid #334155; }
    </style>
</head>
<body>
<div class="container">
    <h1>Agri-Forest Fire Risk Dashboard</h1>
    <div class="dashboard-layout">
        <div class="control-panel">
            <h2>Sensor Controls</h2>
            <form action="/" method="POST">
                <div class="form-group">
                    <label for="ndvi">NDVI (Vegetation Index) <span id="ndvi_val">{{ inputs.NDVI }}</span></label>
                    <input type="range" min="-0.2" max="0.8" step="0.01" name="NDVI" id="ndvi" value="{{ inputs.NDVI }}" oninput="document.getElementById('ndvi_val').innerText=this.value">
                </div>
                <div class="form-group">
                    <label for="neigh_ndvi">Neighborhood Avg NDVI <span id="neigh_val">{{ inputs.neighborhood_avg_ndvi }}</span></label>
                    <input type="range" min="-0.2" max="0.8" step="0.01" name="neighborhood_avg_ndvi" id="neigh_ndvi" value="{{ inputs.neighborhood_avg_ndvi }}" oninput="document.getElementById('neigh_val').innerText=this.value">
                </div>
                <div class="form-group">
                    <label for="lst">Land Surface Temp (LST °C) <span id="lst_val">{{ inputs.LST }}</span></label>
                    <input type="range" min="15" max="50" step="0.1" name="LST" id="lst" value="{{ inputs.LST }}" oninput="document.getElementById('lst_val').innerText=this.value">
                </div>
                <div class="form-group">
                    <label for="deficit">Rainfall Deficit (mm) <span id="def_val">{{ inputs.rainfall_deficit }}</span></label>
                    <input type="range" min="0" max="150" step="0.5" name="rainfall_deficit" id="deficit" value="{{ inputs.rainfall_deficit }}" oninput="document.getElementById('def_val').innerText=this.value">
                </div>
                <button type="submit" class="submit-btn">Analyze & Predict Risk</button>
            </form>
        </div>
        <div class="main-display">
            <div class="output-panel">
                <h2 style="color:#94a3b8;font-size:14px;text-transform:uppercase;letter-spacing:1px;border:none;">Prediction Engine Output</h2>
                <div class="prediction-text {% if prediction %}risk-{{ prediction }}{% else %}risk-Low{% endif %}">
                    {% if prediction %} {{ prediction }} Risk Profile {% else %} Awaiting Input... {% endif %}
                </div>
            </div>
            <div class="output-panel" style="text-align:left;">
                <h2>Spatial Validation Accuracy: {{ metrics.accuracy }}</h2>
                <pre>{{ metrics.report }}</pre>
            </div>
        </div>
    </div>
</div>
</body>
</html>
